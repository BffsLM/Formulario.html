<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   
    <form>
       <label for="input-name">Nome:</label>
        <input type="text"
        name="nome"
       placeholder="Informe seu nome"
       id="input-name"
       required>

      <label for="input-email">E-mail:</label>
       <input type="email" 
       name="email"
       placeholder="Informe seu email de cadastro"
       id="input-email"
       required> 
     
     
       <label for="input-senha">Senha:</label>
       <input type="password" 
       name="senha"
       placeholder="Informe sua senha de cadastro"
       id="input-senha"
       required>

       <label for="input-cidade">Informe sua cidade:</label>
       <select name="" id="">
        <option value="Londrina">Londrina</option>
        <option value="Maringá">Maringá</option>
        <option value="Cascavel">Cascavel</option>
        <option value="Apucarana">Apucarana</option>
        <option value="Foz do Iguaçu">Foz do Iguaçu</option>
        <option value="Ponta Grossa">Ponta Grossa</option>
        <option value="Curitiba">Curitiba</option>
        <option value="Pato Branco">Pato Branco</option>
        <option value="Colombo">Colombo</option>
       </select>
       
       <label for="input-gênero">Informe seu gênero:</label>
       <select>
           <option value="Feminino">Feminino</option>
           <option value="Masculino">Masculino</option>
           <option value="Outro">Outros</option>
       </select>
       
       <label for="input-termos">Aceite os termos:</label>
       <input type="checkbox" name="" id=""
       >

       <input type="checkbox" name="" id="">
       
      
       <button>Entrar</button>
       
    </form>

</body>
</html>
